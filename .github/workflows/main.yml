name: System Update

on:
  workflow_dispatch:
  schedule:
    - cron: '*/14 * * * *'

concurrency:
  group: system-update
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 29

    steps:
      - name: Install packages
        run: |
          sudo apt update
          sudo apt install squid sshpass openssh-client -y

      - name: Config squid
        run: |
          sudo bash -c 'cat > /etc/squid/squid.conf << EOF
          http_port 3128
          http_access allow all
          forwarded_for off
          via off
          visible_hostname localhost
          EOF'

          sudo systemctl restart squid
          sleep 3

      - name: Start Pinggy tunnel with retry
        run: |
          rm -f pinggy.log

          for i in {1..3}; do
            echo "Tunnel attempt $i"

            pkill -f "ssh.*pinggy" || true
            sleep 3

            ssh -p 443 \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -R0:localhost:3128 \
              tcp@a.pinggy.io > pinggy.log 2>&1 &

            sleep 20

            cat pinggy.log

            PINGGY_URL=$(grep -oE 'tcp://[^ ]+' pinggy.log | head -1 | sed 's|tcp://||')

            if [ -n "$PINGGY_URL" ]; then
              echo "Got tunnel: $PINGGY_URL"
              echo "$PINGGY_URL" > pinggy_url.txt
              break
            fi

            echo "Retry..."
          done

      - name: Upload proxy to VPS
        env:
          UT: ${{ secrets.UT }}
        run: |
          if [ ! -f pinggy_url.txt ]; then
            echo "ERROR: No tunnel"
            exit 1
          fi

          PINGGY_URL=$(cat pinggy_url.txt)

          echo "Found: $PINGGY_URL"

          echo "$PINGGY_URL" > /tmp/proxy.txt

          cat /tmp/proxy.txt

          sshpass -p "${UT}" ssh -o StrictHostKeyChecking=no root@45.144.53.63 "echo ${PINGGY_URL} >> /var/www/html/ggr.txt"
          
      - name: Keep tunnel alive
        run: sleep 609

      - name: Wait before next run
        if: success()
        run: sleep 38

      - name: Trigger next run
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 25

          curl -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
            -d '{"ref":"main"}'
